        // ensure we have 160 items
        console.assert(QUESTIONS.length === 160, 'should be 160 questions');

        // ----- state -----
        let currentIndex = 0;
        const totalQ = QUESTIONS.length;
        const userAnswers = new Array(totalQ).fill(null); // store selected index (0..n-1)
        const revealed = new Array(totalQ).fill(false);   // if answer was revealed

        const qContainer = document.getElementById('questionContainer');
        const qNumber = document.getElementById('qNumber');
        const qText = document.getElementById('qText');
        const optionsContainer = document.getElementById('optionsContainer');
        const progressBadge = document.getElementById('progressBadge');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const submitBtn = document.getElementById('submitBtn');
        const quizArea = document.getElementById('quizArea');
        const resultsArea = document.getElementById('resultsArea');
        const finalScore = document.getElementById('finalScore');
        const restartBtn = document.getElementById('restartBtn');
        const infoMsg = document.getElementById('infoMessage');

        function renderQuestion(index) {
            const q = QUESTIONS[index];
            if (!q) return;
            qNumber.textContent = `Q${index+1}`;
            qText.textContent = q.q;
            progressBadge.textContent = `${index+1} / ${totalQ}`;

            // build options
            let html = '';
            const letters = ['A', 'B', 'C', 'D'];
            const selectedIdx = userAnswers[index];
            const isRevealed = revealed[index];

            q.opts.forEach((optText, i) => {
                let classes = 'opt';
                if (selectedIdx === i) classes += ' selected';
                if (isRevealed) {
                    if (i === q.correct) classes += ' correct-reveal';
                    else if (selectedIdx === i && i !== q.correct) classes += ' wrong-reveal';
                    classes += ' disabled';
                }
                const checkedAttr = (selectedIdx === i) ? 'checked' : '';
                html += `
                    <div class="${classes}" data-optidx="${i}">
                        <label>
                            <input type="radio" name="question" value="${i}" ${checkedAttr} ${isRevealed ? 'disabled' : ''}>
                            <span><span class="letter">${letters[i]}.</span> ${optText}</span>
                        </label>
                    </div>
                `;
            });
            optionsContainer.innerHTML = html;

            // attach click listeners (for selection)
            if (!isRevealed) {
                document.querySelectorAll('.opt input[type="radio"]').forEach((radio, idx) => {
                    radio.addEventListener('change', function(e) {
                        const val = parseInt(this.value);
                        if (!isNaN(val)) {
                            userAnswers[currentIndex] = val;
                            renderQuestion(currentIndex); // re-render
                        }
                    });
                });
            }

            // update button states
            prevBtn.disabled = (index === 0);
            nextBtn.textContent = (index === totalQ-1) ? 'Finish' : 'Next ▶';
            infoMsg.textContent = isRevealed ? '✅ Answer revealed' : (selectedIdx !== null ? '✓ Answered' : '');
        }

        function goTo(index) {
            if (index < 0) index = 0;
            if (index >= totalQ) index = totalQ - 1;
            currentIndex = index;
            renderQuestion(currentIndex);
            // scroll to top of card
            qContainer.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function submitQuiz() {
            // reveal all answers
            for (let i = 0; i < totalQ; i++) {
                revealed[i] = true;
            }
            // compute score
            let correct = 0;
            for (let i = 0; i < totalQ; i++) {
                if (userAnswers[i] !== null && userAnswers[i] === QUESTIONS[i].correct) correct++;
            }
            // show results
            quizArea.classList.add('hidden');
            resultsArea.classList.remove('hidden');
            finalScore.textContent = correct;
            // scroll to results
            resultsArea.scrollIntoView({ behavior: 'smooth' });
        }

        function restartQuiz() {
            for (let i = 0; i < totalQ; i++) {
                userAnswers[i] = null;
                revealed[i] = false;
            }
            currentIndex = 0;
            resultsArea.classList.add('hidden');
            quizArea.classList.remove('hidden');
            renderQuestion(0);
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // event listeners
        prevBtn.addEventListener('click', () => goTo(currentIndex - 1));
        nextBtn.addEventListener('click', () => {
            if (currentIndex === totalQ - 1) {
                // finish / submit
                submitQuiz();
            } else {
                goTo(currentIndex + 1);
            }
        });

        submitBtn.addEventListener('click', () => {
            // confirm?
            if (confirm('Submit all answers and see your score?')) {
                submitQuiz();
            }
        });

        restartBtn.addEventListener('click', restartQuiz);

        // keyboard / touch friendly
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === 'ArrowDown') {
                e.preventDefault();
                if (currentIndex < totalQ - 1) goTo(currentIndex + 1);
            } else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') {
                e.preventDefault();
                if (currentIndex > 0) goTo(currentIndex - 1);
            }
        });

        // init
        renderQuestion(0);
    })();
